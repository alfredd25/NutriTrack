services:
  postgres_test:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: test_db
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
    ports:
      - "5433:5432"

  redis_test:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  api_test:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /app
    command: python -m pytest /app/tests/ -v --cov=app --cov-report=term-missing
    environment:
      - TEST_DATABASE_URL=postgresql://test_user:test_pass@postgres_test:5432/test_db
      - POSTGRES_USER=test_user
      - POSTGRES_PASSWORD=test_pass
      - POSTGRES_DB=test_db
      - POSTGRES_HOST=postgres_test
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis_test
      - REDIS_PORT=6379
    depends_on:
      - postgres_test
      - redis_test