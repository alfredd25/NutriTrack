version: '3.8'

services:

  api:
    build: .
    container_name: calorie_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - ./usda:/app/usda
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15-alpine
    container_name: calorie_postgres
    environment:
      POSTGRES_USER: calorie_user
      POSTGRES_PASSWORD: calorie_password
      POSTGRES_DB: calorie_db
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: calorie_redis
    ports:
      - "6379:6379"

  celery_worker:
    build: .
    command: celery -A app.core.celery_worker.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - postgres
    env_file:
      - .env