services:

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: calorie_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
      - ./usda:/app/usda
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15-alpine
    container_name: calorie_postgres
    environment:
      POSTGRES_USER: calorie_user
      POSTGRES_PASSWORD: calorie_password
      POSTGRES_DB: calorie_db
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: calorie_redis
    ports:
      - "6379:6379"

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.core.celery_worker.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - postgres
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: calorie_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
    depends_on:
      - api
  
  nginx:
    image: nginx:alpine
    container_name: calorie_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend